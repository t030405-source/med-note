<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Medical Note Generator</title>
    <style>
        /* 基礎設定：Apple System Font */
        body { 
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; 
            background-color: #F5F5F7; 
            color: #1D1D1F;
            display: flex; 
            justify-content: center; 
            padding: 40px 20px;
            margin: 0;
        }

        /* 容器卡片 */
        .card { 
            background: #FFFFFF; 
            padding: 32px; 
            border-radius: 20px; 
            box-shadow: 0 8px 30px rgba(0,0,0,0.04); 
            width: 100%; 
            max-width: 480px; 
        }

        h2 { 
            font-size: 24px; 
            font-weight: 600; 
            margin-bottom: 24px; 
            text-align: center;
            letter-spacing: -0.5px;
        }

        .group { margin-bottom: 24px; }

        .label { 
            font-size: 13px; 
            font-weight: 600; 
            color: #86868B; 
            margin-bottom: 12px; 
            display: block; 
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }

        /* 按鈕網格：因應不同選項數量做 2/3/4 排列 */
        .btn-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 8px; }
        .btn-grid-2 { display: grid; grid-template-columns: repeat(2, 1fr); gap: 8px; }
        .btn-grid-4 { display: grid; grid-template-columns: repeat(4, 1fr); gap: 8px; }

        input[type="radio"] { display: none; }

        /* 蘋果風格按鈕 */
        label.btn { 
            border: 1px solid #D2D2D7; 
            padding: 12px 4px; 
            text-align: center; 
            border-radius: 10px; 
            cursor: pointer; 
            transition: all 0.2s ease; 
            background: #FFFFFF;
            font-size: 14px;
            color: #424245;
            display: flex;
            align-items: center;
            justify-content: center;
            line-height: 1.2;
        }

        label.btn:hover { background: #F5F5F7; }

        /* 選中狀態 */
        input[type="radio"]:checked + label.btn { 
            background: #0071E3; 
            color: #FFFFFF; 
            border-color: #0071E3; 
            font-weight: 500;
        }

        /* 文字輸出區 */
        textarea { 
            width: 100%; 
            height: 180px; 
            background: #FBFBFD;
            border: 1px solid #D2D2D7; 
            border-radius: 12px; 
            padding: 16px; 
            font-family: "SF Mono", Menlo, monospace; 
            font-size: 14px;
            line-height: 1.6;
            color: #1D1D1F;
            box-sizing: border-box; 
            resize: none;
            outline: none;
        }

        textarea:focus { border-color: #0071E3; }

        /* 複製按鈕 */
        .copy-btn { 
            width: 100%; 
            background: #1D1D1F; 
            color: #FFFFFF; 
            border: none; 
            padding: 14px; 
            border-radius: 12px; 
            font-size: 15px; 
            font-weight: 500; 
            cursor: pointer; 
            margin-top: 16px; 
            transition: opacity 0.2s;
        }

        .copy-btn:hover { opacity: 0.8; }
        .copy-btn:active { transform: scale(0.98); }
    </style>
</head>
<body>
    <div class="card">
        <h2>Medical Notes</h2>
        
        <div class="group">
            <span class="label">Side & Part</span>
            <div class="btn-grid" style="margin-bottom: 8px;">
                <input type="radio" name="side" id="L" value="left" checked><label class="btn" for="L">Left</label>
                <input type="radio" name="side" id="R" value="right"><label class="btn" for="R">Right</label>
                <input type="radio" name="side" id="BL" value="bilateral"><label class="btn" for="BL">Bilateral</label>
            </div>
            <div class="btn-grid-4">
                <input type="radio" name="part" id="Sh" value="shoulder" checked><label class="btn" for="Sh">Shoulder</label>
                <input type="radio" name="part" id="Wr" value="wrist"><label class="btn" for="Wr">Wrist</label>
                <input type="radio" name="part" id="Hi" value="hip"><label class="btn" for="Hi">Hip</label>
                <input type="radio" name="part" id="Kn" value="knee"><label class="btn" for="Kn">Knee</label>
                <input type="radio" name="part" id="Ba" value="lower back"><label class="btn" for="Ba">Back</label>
                <input type="radio" name="part" id="Ak" value="ankle"><label class="btn" for="Ak">Ankle</label>
                <input type="radio" name="part" id="Nk" value="neck"><label class="btn" for="Nk">Neck</label>
            </div>
        </div>

        <div class="group">
            <span class="label">Duration</span>
            <div class="btn-grid-4">
                <input type="radio" name="duration" id="d_days" value="days" checked><label class="btn" for="d_days">Days</label>
                <input type="radio" name="duration" id="d_weeks" value="weeks"><label class="btn" for="d_weeks">Weeks</label>
                <input type="radio" name="duration" id="d_months" value="months"><label class="btn" for="d_months">Months</label>
                <input type="radio" name="duration" id="d_years" value="years"><label class="btn" for="d_years">Years</label>
            </div>
        </div>

        <div class="group">
            <span class="label">Trauma</span>
            <div class="btn-grid-2">
                <input type="radio" name="trauma" id="t_pos" value="+" checked><label class="btn" for="t_pos">+</label>
                <input type="radio" name="trauma" id="t_neg" value="-"><label class="btn" for="t_neg">-</label>
            </div>
        </div>

        <div class="group">
            <span class="label">ROM</span>
            <div class="btn-grid-2">
                <input type="radio" name="rom" id="r_free" value="free" checked><label class="btn" for="r_free">Free</label>
                <input type="radio" name="rom" id="r_limit" value="limitation"><label class="btn" for="r_limit">Limitation</label>
            </div>
        </div>

        <div class="group">
            <span class="label">X-Ray</span>
            <div class="btn-grid-2">
                <input type="radio" name="xray" id="x_pos" value="+" checked><label class="btn" for="x_pos">+</label>
                <input type="radio" name="xray" id="x_neg" value="no obvious findings"><label class="btn" for="x_neg">No obvious findings</label>
            </div>
        </div>

        <div class="group">
            <span class="label">Echo</span>
            <div class="btn-grid">
                <input type="radio" name="echo" id="e_pt" value="partial tear" checked><label class="btn" for="e_pt">Partial tear</label>
                <input type="radio" name="echo" id="e_eff" value="effusion"><label class="btn" for="e_eff">Effusion</label>
                <input type="radio" name="echo" id="e_neg" value="no obvious findings"><label class="btn" for="e_neg">No obvious findings</label>
            </div>
        </div>

        <div class="group">
            <span class="label">Suggestion</span>
            <div class="btn-grid-2">
                <input type="radio" name="sug_rehab" id="s_rehab" value="rehab first" checked><label class="btn" for="s_rehab">Rehab first</label>
                <input type="radio" name="sug_rehab" id="s_inj" value="consider injection"><label class="btn" for="s_inj">Consider injection</label>
            </div>
        </div>

        <div class="group">
            <span class="label">Output</span>
            <textarea id="output" readonly></textarea>
            <button class="copy-btn" onclick="copyNote()">Copy Note</button>
        </div>
    </div>

    <script>
        function update() {
            // 抓取所有選中的按鈕數值
            const side = document.querySelector('input[name="side"]:checked').value;
            const part = document.querySelector('input[name="part"]:checked').value;
            const duration = document.querySelector('input[name="duration"]:checked').value;
            const trauma = document.querySelector('input[name="trauma"]:checked').value;
            const rom = document.querySelector('input[name="rom"]:checked').value;
            const xray = document.querySelector('input[name="xray"]:checked').value;
            const echo = document.querySelector('input[name="echo"]:checked').value;
            const suggestion = document.querySelector('input[name="sug_rehab"]:checked').value;

            // 依順序拼接字串 (自動化產生純文字敘述)
            let note = `${side} ${part} pain for ${duration}\n`;
            note += `Trauma: ${trauma}\n`;
            note += `ROM: ${rom}\n`;
            note += `X-ray: ${xray}\n`;
            note += `Echo: ${echo}\n`;
            note += `Suggestion: ${suggestion}`;
            
            document.getElementById('output').value = note;
        }

        function copyNote() {
            const area = document.getElementById("output");
            area.select();
            navigator.clipboard.writeText(area.value);
            const btn = document.querySelector('.copy-btn');
            btn.innerText = "Copied!";
            setTimeout(() => btn.innerText = "Copy Note", 2000);
        }

        // 監聽所有按鈕，一點擊即時更新文字
        document.querySelectorAll('input').forEach(i => i.addEventListener('change', update));
        
        // 初始載入時先執行一次
        update();
    </script>
</body>
</html>
