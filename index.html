<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Medical Note Generator</title>
    <style>
        /* 基礎設定：Apple System Font */
        body { 
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; 
            background-color: #F5F5F7; 
            color: #1D1D1F;
            display: flex; 
            justify-content: center; 
            padding: 40px 20px;
            margin: 0;
        }

        /* 容器卡片 */
        .card { 
            background: #FFFFFF; 
            padding: 32px; 
            border-radius: 20px; 
            box-shadow: 0 8px 30px rgba(0,0,0,0.04); 
            width: 100%; 
            max-width: 480px; 
        }

        h2 { 
            font-size: 24px; 
            font-weight: 600; 
            margin-bottom: 24px; 
            text-align: center;
            letter-spacing: -0.5px;
        }

        .group { margin-bottom: 28px; }

        .label { 
            font-size: 13px; 
            font-weight: 600; 
            color: #86868B; 
            margin-bottom: 12px; 
            display: block; 
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }

        /* 按鈕網格 */
        .btn-grid { 
            display: grid; 
            grid-template-columns: repeat(3, 1fr); 
            gap: 8px; 
        }

        input[type="radio"] { display: none; }

        /* 蘋果風格按鈕 */
        label.btn { 
            border: 1px solid #D2D2D7; 
            padding: 12px 4px; 
            text-align: center; 
            border-radius: 10px; 
            cursor: pointer; 
            transition: all 0.2s ease; 
            background: #FFFFFF;
            font-size: 14px;
            color: #424245;
        }

        label.btn:hover { background: #F5F5F7; }

        /* 選中狀態 */
        input[type="radio"]:checked + label.btn { 
            background: #0071E3; 
            color: #FFFFFF; 
            border-color: #0071E3; 
            font-weight: 500;
        }

        /* 文字輸出區 */
        textarea { 
            width: 100%; 
            height: 180px; 
            background: #FBFBFD;
            border: 1px solid #D2D2D7; 
            border-radius: 12px; 
            padding: 16px; 
            font-family: "SF Mono", Menlo, monospace; 
            font-size: 13px;
            line-height: 1.5;
            color: #1D1D1F;
            box-sizing: border-box; 
            resize: none;
            outline: none;
        }

        textarea:focus { border-color: #0071E3; }

        /* 複製按鈕 */
        .copy-btn { 
            width: 100%; 
            background: #1D1D1F; 
            color: #FFFFFF; 
            border: none; 
            padding: 14px; 
            border-radius: 12px; 
            font-size: 15px; 
            font-weight: 500; 
            cursor: pointer; 
            margin-top: 16px; 
            transition: opacity 0.2s;
        }

        .copy-btn:hover { opacity: 0.8; }
        .copy-btn:active { transform: scale(0.98); }
    </style>
</head>
<body>
    <div class="card">
        <h2>Medical Notes</h2>
        
        <div class="group">
            <span class="label">Side</span>
            <div class="btn-grid">
                <input type="radio" name="side" id="L" value="Left" checked><label class="btn" for="L">Left</label>
                <input type="radio" name="side" id="R" value="Right"><label class="btn" for="R">Right</label>
                <input type="radio" name="side" id="BL" value="Bilateral"><label class="btn" for="BL">Bilateral</label>
            </div>
        </div>

        <div class="group">
            <span class="label">Part</span>
            <div class="btn-grid">
                <input type="radio" name="part" id="Sh" value="Shoulder" checked><label class="btn" for="Sh">Shoulder</label>
                <input type="radio" name="part" id="Wr" value="Wrist"><label class="btn" for="Wr">Wrist</label>
                <input type="radio" name="part" id="Hi" value="Hip"><label class="btn" for="Hi">Hip</label>
                <input type="radio" name="part" id="Kn" value="Knee"><label class="btn" for="Kn">Knee</label>
                <input type="radio" name="part" id="Ba" value="Low Back"><label class="btn" for="Ba">Back</label>
                <input type="radio" name="part" id="Ak" value="Ankle"><label class="btn" for="Ak">Ankle</label>
                <input type="radio" name="part" id="Nk" value="Neck"><label class="btn" for="Nk">Neck</label>
            </div>
        </div>

        <div class="group">
            <span class="label">Output</span>
            <textarea id="output" readonly></textarea>
            <button class="copy-btn" onclick="copyNote()">Copy Note</button>
        </div>
    </div>

    <script>
        const templates = {
            "Shoulder": "S: Pain during overhead activities.\nO: Positive impingement sign, limited ROM.\nA: Subacromial impingement syndrome.\nP: Physical therapy, activity modification.",
            "Knee": "S: Pain during stair climbing/squatting.\nO: Mild effusion, joint line tenderness.\nA: Degenerative joint disease of knee.\nP: Quadriceps strengthening, weight control.",
            "Hip": "S: Groin pain while walking.\nO: Limited internal rotation, positive FADIR test.\nA: Hip labral tear suspected.\nP: Avoid deep flexion, referral for MRI.",
            "Low Back": "S: Localized back pain with radiculopathy.\nO: Positive SLR test, decreased lumbar ROM.\nA: Lumbar disc herniation.\nP: Core stabilization, pelvic traction.",
            "Wrist": "S: Numbness over radial side.\nO: Positive Tinel sign.\nA: Carpal tunnel syndrome.\nP: Wrist splinting.",
            "Ankle": "S: Ankle instability/pain.\nO: Positive anterior drawer test.\nA: Ankle ligament sprain.\nP: Balance training, bracing."
        };

        function update() {
            const side = document.querySelector('input[name="side"]:checked').value;
            const part = document.querySelector('input[name="part"]:checked').value;
            let note = templates[part].replace(/S: /g, `S: ${side} `).replace(/O: /g, `O: ${side} `).replace(/A: /g, `A: ${side} `);
            document.getElementById('output').value = note;
        }

        function copyNote() {
            const area = document.getElementById("output");
            area.select();
            navigator.clipboard.writeText(area.value);
            const btn = document.querySelector('.copy-btn');
            btn.innerText = "Copied!";
            setTimeout(() => btn.innerText = "Copy Note", 2000);
        }

        document.querySelectorAll('input').forEach(i => i.addEventListener('change', update));
        update();
    </script>
</body>
</html>
